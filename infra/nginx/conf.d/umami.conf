# This file is rendered by the official nginx Docker entrypoint using envsubst.
# UMAMI_DOMAIN comes from ../.env.

upstream umami_app {
  server umami:3000;
}

server {
  listen 80;
  listen [::]:80;
  server_name ${UMAMI_DOMAIN};

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name ${UMAMI_DOMAIN};

  ssl_certificate /etc/letsencrypt/live/${UMAMI_DOMAIN}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/${UMAMI_DOMAIN}/privkey.pem;

  location / {
    proxy_pass http://umami_app;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
