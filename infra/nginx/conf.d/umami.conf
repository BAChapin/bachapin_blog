# This file is rendered by the official nginx Docker entrypoint using envsubst.
# UMAMI_DOMAIN comes from ../.env.
#
# HTTPS-ready notes:
# - For Let's Encrypt, mount certificates into the nginx container, commonly:
#   /etc/letsencrypt/live/${UMAMI_DOMAIN}/fullchain.pem
#   /etc/letsencrypt/live/${UMAMI_DOMAIN}/privkey.pem
# - Then uncomment the HTTPS server block below and the HTTP redirect server.

upstream umami_app {
  server umami:3000;
}

server {
  listen 80;
  listen [::]:80;
  server_name ${UMAMI_DOMAIN};

  location / {
    proxy_pass http://umami_app;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

