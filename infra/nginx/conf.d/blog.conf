# This file is rendered by the official nginx Docker entrypoint using envsubst.
# DOMAIN comes from ../.env.
#
# HTTPS-ready notes:
# - For Let's Encrypt, mount certificates into the nginx container, commonly:
#   /etc/letsencrypt/live/${DOMAIN}/fullchain.pem
#   /etc/letsencrypt/live/${DOMAIN}/privkey.pem
# - Then uncomment the HTTPS server block below and the HTTP redirect server.

server {
  listen 80;
  listen [::]:80;
  server_name ${DOMAIN};

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|mjs|svg|png|jpg|jpeg|gif|webp|ico|woff2?|ttf)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }
}

